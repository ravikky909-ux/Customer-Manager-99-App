name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: customer-manager-99-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Final Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Customer Manager source
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_ZIP="Customer_Manager_99_App_Source.zip"

          if [ ! -f "$SOURCE_ZIP" ]; then
            echo "ERROR: $SOURCE_ZIP repository ke main/root page par nahi mila."
            exit 1
          fi

          rm -rf lib assets scripts test android
          rm -f pubspec.yaml analysis_options.yaml firebase.rules PROJECT_MARKER.txt
          unzip -o "$SOURCE_ZIP" -d .

          required_files=(
            "PROJECT_MARKER.txt"
            "pubspec.yaml"
            "lib/main.dart"
            "lib/screens.dart"
            "lib/app_controller.dart"
            "lib/services.dart"
            "assets/branding/allrounder99.png"
            "assets/branding/rajahuli99_icon.png"
            "assets/branding/rajahuli99_wordmark.jpg"
            "assets/branding/combined_brand_splash.png"
            "assets/branding/app_icon_safe.png"
            "assets/branding/app_icon_foreground.png"
            "scripts/prepare_android.py"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
          done

          grep -q "CustomerManagerApp" lib/main.dart
          grep -q "CM99-FINAL" lib/screens.dart

          if grep -R -n -E \
            "Flutter Demo Home Page|You have pushed the button this many times|class MyHomePage|_counter\+\+" \
            lib; then
            echo "ERROR: Flutter Demo source detected. Build stopped."
            exit 1
          fi

          echo "Customer Manager 99 custom source verified."

          find lib assets/branding -type f -print0 |
            sort -z |
            xargs -0 sha256sum > "$RUNNER_TEMP/source-before.sha256"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Generate Android platform safely
        shell: bash
        run: |
          set -euo pipefail

          TEMP_APP="$RUNNER_TEMP/customer_manager_android"
          rm -rf "$TEMP_APP" android

          flutter create \
            --platforms=android \
            --org com.gamerush99 \
            --project-name customer_manager_99 \
            "$TEMP_APP"

          cp -R "$TEMP_APP/android" ./android
          python3 scripts/prepare_android.py

      - name: Verify app source was not overwritten
        shell: bash
        run: |
          set -euo pipefail

          find lib assets/branding -type f -print0 |
            sort -z |
            xargs -0 sha256sum > "$RUNNER_TEMP/source-after.sha256"

          diff -u \
            "$RUNNER_TEMP/source-before.sha256" \
            "$RUNNER_TEMP/source-after.sha256"

          grep -q "CustomerManagerApp" lib/main.dart
          grep -q "CM99-FINAL" lib/screens.dart

          if grep -R -n -E \
            "Flutter Demo Home Page|You have pushed the button this many times|class MyHomePage|_counter\+\+" \
            lib; then
            echo "ERROR: Flutter Demo source appeared after Android generation."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate branded app icon
        run: dart run flutter_launcher_icons

      - name: Verify logos and launcher icons
        shell: bash
        run: |
          set -euo pipefail

          test -s assets/branding/allrounder99.png
          test -s assets/branding/rajahuli99_icon.png
          test -s assets/branding/rajahuli99_wordmark.jpg
          test -s assets/branding/combined_brand_splash.png
          test -s assets/branding/app_icon_safe.png

          test -s android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          test -s android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          test -s android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          test -s android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          test -s android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "All logos and custom launcher icons verified."

      - name: Build release APK
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          set -euo pipefail

          BUILD_ARGS=(
            "--dart-define=APP_BUILD_MARKER=CM99-FINAL-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          )

          if [ -n "${FIREBASE_API_KEY:-}" ] && \
             [ -n "${FIREBASE_APP_ID:-}" ] && \
             [ -n "${FIREBASE_MESSAGING_SENDER_ID:-}" ] && \
             [ -n "${FIREBASE_PROJECT_ID:-}" ]; then

            echo "Firebase configured: cross-phone cloud sync enabled."

            BUILD_ARGS+=("--dart-define=FIREBASE_API_KEY=$FIREBASE_API_KEY")
            BUILD_ARGS+=("--dart-define=FIREBASE_APP_ID=$FIREBASE_APP_ID")
            BUILD_ARGS+=("--dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID")
            BUILD_ARGS+=("--dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID")

            if [ -n "${FIREBASE_STORAGE_BUCKET:-}" ]; then
              BUILD_ARGS+=("--dart-define=FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET")
            fi
          else
            echo "Firebase secrets missing: APK local-data mode me build hoga."
            echo "Cross-phone sync ke liye Firebase secrets baad me add karna hoga."
          fi

          flutter build apk --release --no-shrink "${BUILD_ARGS[@]}"

      - name: Validate and rename APK
        shell: bash
        run: |
          set -euo pipefail

          APK="build/app/outputs/flutter-apk/app-release.apk"
          test -s "$APK"

          mkdir -p release

          FINAL_APK="release/Customer-Manager-99-FINAL-${GITHUB_RUN_NUMBER}.apk"

          cp "$APK" "$FINAL_APK"
          sha256sum "$FINAL_APK" > "${FINAL_APK}.sha256"

          unzip -l "$FINAL_APK" | grep -q "res/mipmap"

          ls -lh "$FINAL_APK"

      - name: Upload final APK
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-FINAL-${{ github.run_number }}
          path: |
            release/Customer-Manager-99-FINAL-${{ github.run_number }}.apk
            release/Customer-Manager-99-FINAL-${{ github.run_number }}.apk.sha256
          if-no-files-found: error
          retention-days: 30
