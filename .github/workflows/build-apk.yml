name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: customer-manager-99-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.7"

jobs:
  build:
    name: Build Final 41790 V4 Instant Sync APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract uploaded final source ZIP
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s "Customer_Manager_99_App_Source.zip" ]; then
            echo "ERROR: Customer_Manager_99_App_Source.zip missing or empty"
            exit 1
          fi

          rm -rf lib assets scripts test android
          rm -f pubspec.yaml analysis_options.yaml firebase.rules PROJECT_MARKER.txt
          unzip -q -o Customer_Manager_99_App_Source.zip -d .

          required_files=(
            "PROJECT_MARKER.txt"
            "pubspec.yaml"
            "lib/main.dart"
            "lib/screens.dart"
            "lib/app_controller.dart"
            "lib/services.dart"
            "scripts/prepare_android.py"
            "assets/preload/customer_manager_99_seed_41790.db"
            "assets/branding/app_icon_safe.png"
            "google-services.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
          done

          python3 - <<'PY'
          import json
          import sqlite3

          path = "assets/preload/customer_manager_99_seed_41790.db"
          db = sqlite3.connect(path)
          total = db.execute("SELECT COUNT(*) FROM customers").fetchone()[0]
          unique_total = db.execute(
              "SELECT COUNT(DISTINCT mobile) FROM customers"
          ).fetchone()[0]
          invalid = db.execute(
              """
              SELECT COUNT(*) FROM customers
              WHERE length(mobile) != 12
                 OR substr(mobile, 1, 2) != '91'
                 OR substr(mobile, 3, 1) NOT IN ('6','7','8','9')
              """
          ).fetchone()[0]
          integrity = db.execute("PRAGMA integrity_check").fetchone()[0]
          user_version = db.execute("PRAGMA user_version").fetchone()[0]
          seed_version_row = db.execute(
              "SELECT value FROM app_meta WHERE key = 'seed_version'"
          ).fetchone()
          db.close()

          assert total == 41790, total
          assert unique_total == 41790, unique_total
          assert invalid == 0, invalid
          assert integrity == "ok", integrity
          assert user_version == 3, user_version
          assert seed_version_row and seed_version_row[0] == "master_41790_v3"

          config = json.load(open("google-services.json", encoding="utf-8"))
          client = config["client"][0]
          assert config["project_info"]["project_id"] == "customer-manager-99"
          assert client["client_info"]["android_client_info"]["package_name"] == \
              "com.gamerush99.customermanager99"

          print("41,790 database and bundled Firebase config verified.")
          PY

          grep -q "customerRecordsV4" lib/services.dart
          grep -q "_bundledProjectId = 'customer-manager-99'" lib/services.dart
          grep -q "Duration(seconds: 3)" lib/app_controller.dart
          grep -q "version: 4.3.0+17" pubspec.yaml
          echo "V4 instant multi-phone sync source confirmed."

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate Android platform
        shell: bash
        run: |
          set -euo pipefail

          TEMP_APP="$RUNNER_TEMP/cm99_android_scaffold"
          rm -rf "$TEMP_APP" android

          flutter create \
            --platforms=android \
            --org com.gamerush99 \
            --project-name customer_manager_99 \
            "$TEMP_APP"

          cp -R "$TEMP_APP/android" ./android
          cp google-services.json android/app/google-services.json
          python3 scripts/prepare_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate branded app icon
        run: dart run flutter_launcher_icons

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "test" ] && find test -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No tests found. Skipping tests."
          fi

      - name: Build final release APK
        shell: bash
        run: |
          set -euo pipefail

          flutter build apk \
            --release \
            --no-shrink \
            --dart-define=APP_BUILD_MARKER=CM99-41790-V4-INSTANT-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}

      - name: Validate and rename APK
        shell: bash
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"

          if [ ! -s "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi

          if ! unzip -l "$APK" | grep -q \
            "flutter_assets/assets/preload/customer_manager_99_seed_41790.db"; then
            echo "ERROR: 41,790 database missing inside APK"
            exit 1
          fi

          mkdir -p release
          FINAL_APK="release/Customer-Manager-99-41790-V4-INSTANT-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK" "$FINAL_APK"
          sha256sum "$FINAL_APK" > "${FINAL_APK}.sha256"
          ls -lh "$FINAL_APK"

      - name: Upload final APK
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-41790-V4-INSTANT-${{ github.run_number }}
          path: |
            release/Customer-Manager-99-41790-V4-INSTANT-${{ github.run_number }}.apk
            release/Customer-Manager-99-41790-V4-INSTANT-${{ github.run_number }}.apk.sha256
          if-no-files-found: error
          retention-days: 30
          
