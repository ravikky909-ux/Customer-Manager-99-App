name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: customer-manager-99-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.7"

jobs:
  build:
    name: Build Final 41790 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract uploaded final source ZIP
        shell: bash
        run: |
          set -euo pipefail
          test -s Customer_Manager_99_App_Source.zip

          rm -rf lib assets scripts test android
          rm -f pubspec.yaml analysis_options.yaml firebase.rules PROJECT_MARKER.txt
          unzip -q -o Customer_Manager_99_App_Source.zip -d .

          required_files=(
            "PROJECT_MARKER.txt"
            "pubspec.yaml"
            "lib/main.dart"
            "lib/screens.dart"
            "lib/app_controller.dart"
            "lib/services.dart"
            "scripts/prepare_android.py"
            "assets/preload/customer_manager_99_seed_41790.db"
            "assets/branding/app_icon_safe.png"
          )

          for file in "${required_files[@]}"; do
            test -s "$file" || {
              echo "ERROR: Missing $file"
              exit 1
            }
          done

          python3 - <<'PY'
          import sqlite3

          db = sqlite3.connect(
              "assets/preload/customer_manager_99_seed_41790.db"
          )

          count = db.execute(
              "SELECT COUNT(*) FROM customers"
          ).fetchone()[0]

          unique_count = db.execute(
              "SELECT COUNT(DISTINCT mobile) FROM customers"
          ).fetchone()[0]

          integrity = db.execute(
              "PRAGMA integrity_check"
          ).fetchone()[0]

          user_version = db.execute(
              "PRAGMA user_version"
          ).fetchone()[0]

          db.close()

          assert count == 41790, count
          assert unique_count == 41790, unique_count
          assert integrity == "ok", integrity
          assert user_version == 2, user_version

          print("Preloaded SQLite verified: 41,790 unique records.")
          PY

          grep -q "customer_manager_99_preloaded_41790_v2.db" lib/services.dart
          grep -q "version: 4.2.1+15" pubspec.yaml

          echo "Corrected 41,790 source confirmed."

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate Android platform
        shell: bash
        run: |
          set -euo pipefail

          TEMP_APP="$RUNNER_TEMP/cm99_android_scaffold"

          rm -rf "$TEMP_APP" android

          flutter create \
            --platforms=android \
            --org com.gamerush99 \
            --project-name customer_manager_99 \
            "$TEMP_APP"

          cp -R "$TEMP_APP/android" ./android

          python3 scripts/prepare_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate branded app icon
        run: dart run flutter_launcher_icons

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          if [ -d test ] && find test -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No tests found; skipping."
          fi

      - name: Require Firebase secrets
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail

          for name in \
            FIREBASE_API_KEY \
            FIREBASE_APP_ID \
            FIREBASE_MESSAGING_SENDER_ID \
            FIREBASE_PROJECT_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: Missing GitHub secret: $name"
              exit
