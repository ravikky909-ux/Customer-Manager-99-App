name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: customer-manager-99-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.7"

jobs:
  build:
    name: Build Final V6 FAST SMOOTH APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and validate final source ZIP
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s "Customer_Manager_99_App_Source.zip" ]; then
            echo "ERROR: Customer_Manager_99_App_Source.zip missing or empty"
            exit 1
          fi

          rm -rf lib assets scripts test android
          rm -f pubspec.yaml analysis_options.yaml firebase.rules PROJECT_MARKER.txt google-services.json
          unzip -q -o Customer_Manager_99_App_Source.zip -d .

          required_files=(
            "PROJECT_MARKER.txt"
            "pubspec.yaml"
            "lib/main.dart"
            "lib/models.dart"
            "lib/screens.dart"
            "lib/app_controller.dart"
            "lib/services.dart"
            "scripts/prepare_android.py"
            "assets/preload/customer_manager_99_seed_41790.db"
            "assets/branding/app_icon_safe.png"
            "google-services.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
          done

          python3 - <<'PY'
          import json
          import sqlite3

          database_path = "assets/preload/customer_manager_99_seed_41790.db"
          db = sqlite3.connect(database_path)

          total = db.execute("SELECT COUNT(*) FROM customers").fetchone()[0]
          unique_total = db.execute(
              "SELECT COUNT(DISTINCT mobile) FROM customers"
          ).fetchone()[0]
          integrity = db.execute("PRAGMA integrity_check").fetchone()[0]
          user_version = db.execute("PRAGMA user_version").fetchone()[0]
          seed_version = db.execute(
              "SELECT value FROM app_meta WHERE key = 'seed_version'"
          ).fetchone()

          folder_counts = {"KRISH": 0, "SUNNY": 0, "INVALID": 0}
          for (raw,) in db.execute("SELECT data FROM customers"):
              folder = json.loads(raw).get("assignedTo", "")
              if folder in ("KRISH", "SUNNY"):
                  folder_counts[folder] += 1
              else:
                  folder_counts["INVALID"] += 1

          db.close()

          assert total == 41790, total
          assert unique_total == 41790, unique_total
          assert integrity == "ok", integrity
          assert user_version == 5, user_version
          assert seed_version and seed_version[0] == "master_41790_v5"
          assert folder_counts == {
              "KRISH": 20895,
              "SUNNY": 20895,
              "INVALID": 0,
          }, folder_counts

          config = json.load(open("google-services.json", encoding="utf-8"))
          client = config["client"][0]
          assert config["project_info"]["project_id"] == "customer-manager-99"
          assert client["client_info"]["android_client_info"]["package_name"] == \
              "com.gamerush99.customermanager99"

          print("41,790 customers verified: KRISH 20,895 + SUNNY 20,895.")
          PY

          grep -q "version: 4.5.0+19" pubspec.yaml
          grep -q "Folder:KRISH" lib/screens.dart
          grep -q "Folder:SUNNY" lib/screens.dart
          grep -q "Duration(seconds: 5)" lib/app_controller.dart
          grep -q "filteredCustomers" lib/app_controller.dart
          grep -q "AppScope.read(context)" lib/screens.dart
          grep -q "master_41790_v5" lib/services.dart
          grep -q "customerRecordsV4" lib/services.dart

          echo "Final V6 fast/smooth source confirmed."

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate Android platform
        shell: bash
        run: |
          set -euo pipefail

          TEMP_APP="$RUNNER_TEMP/cm99_android_scaffold"
          rm -rf "$TEMP_APP" android

          flutter create \
            --platforms=android \
            --org com.gamerush99 \
            --project-name customer_manager_99 \
            "$TEMP_APP"

          cp -R "$TEMP_APP/android" ./android
          cp google-services.json android/app/google-services.json
          python3 scripts/prepare_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate branded app icon
        run: dart run flutter_launcher_icons

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "test" ] && find test -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No tests found. Skipping tests."
          fi

      - name: Build final release APK
        shell: bash
        run: |
          set -euo pipefail

          flutter build apk \
            --release \
            --no-shrink \
            --dart-define=APP_BUILD_MARKER=CM99-V6-FAST-SMOOTH-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}

      - name: Validate and rename APK
        shell: bash
        run: |
          set -euo pipefail

          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -s "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi

          if ! unzip -l "$APK" | grep -q \
            "flutter_assets/assets/preload/customer_manager_99_seed_41790.db"; then
            echo "ERROR: 41,790 customer database missing inside APK"
            exit 1
          fi

          mkdir -p release
          FINAL_APK="release/Customer-Manager-99-V6-FAST-SMOOTH-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK" "$FINAL_APK"
          sha256sum "$FINAL_APK" > "${FINAL_APK}.sha256"
          ls -lh "$FINAL_APK"

      - name: Upload final APK
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-V6-FAST-SMOOTH-${{ github.run_number }}
          path: |
            release/Customer-Manager-99-V6-FAST-SMOOTH-${{ github.run_number }}.apk
            release/Customer-Manager-99-V6-FAST-SMOOTH-${{ github.run_number }}.apk.sha256
          if-no-files-found: error
          retention-days: 30
          
