name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android platform files
        run: |
          flutter create --platforms=android --org com.gamerush99 --project-name customer_manager_99 .
          python3 scripts/prepare_android.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate full-fit app icon
        run: dart run flutter_launcher_icons

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build release APK
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          ARGS=()

          if [ -n "$FIREBASE_API_KEY" ]; then
            ARGS+=("--dart-define=FIREBASE_API_KEY=$FIREBASE_API_KEY")
            ARGS+=("--dart-define=FIREBASE_APP_ID=$FIREBASE_APP_ID")
            ARGS+=("--dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID")
            ARGS+=("--dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID")
            ARGS+=("--dart-define=FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET")
          fi

          flutter build apk --release --no-shrink "${ARGS[@]}"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk Customer-Manager-99.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-APK
          path: Customer-Manager-99.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-Source
          path: |
            lib/
            assets/
            pubspec.yaml
            README.md
            firebase.rules
          retention-days: 30
