name: Build Customer Manager 99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Create Android platform files
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder not found. Creating Android platform..."
            flutter create \
              --platforms=android \
              --org com.gamerush99 \
              --project-name customer_manager_99 \
              .
          else
            echo "Android folder already exists."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        shell: bash
        run: |
          if grep -q "flutter_launcher_icons:" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "flutter_launcher_icons configuration not found. Skipping icon generation."
          fi

      - name: Analyze Flutter project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run available tests
        shell: bash
        run: |
          if [ -d "test" ] && find test -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No Flutter tests found. Skipping tests."
          fi

      - name: Build release APK
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        shell: bash
        run: |
          BUILD_ARGS=()

          if [ -n "$FIREBASE_API_KEY" ]; then
            BUILD_ARGS+=("--dart-define=FIREBASE_API_KEY=$FIREBASE_API_KEY")
          fi

          if [ -n "$FIREBASE_APP_ID" ]; then
            BUILD_ARGS+=("--dart-define=FIREBASE_APP_ID=$FIREBASE_APP_ID")
          fi

          if [ -n "$FIREBASE_MESSAGING_SENDER_ID" ]; then
            BUILD_ARGS+=("--dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID")
          fi

          if [ -n "$FIREBASE_PROJECT_ID" ]; then
            BUILD_ARGS+=("--dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID")
          fi

          if [ -n "$FIREBASE_STORAGE_BUCKET" ]; then
            BUILD_ARGS+=("--dart-define=FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET")
          fi

          flutter build apk --release --no-shrink "${BUILD_ARGS[@]}"

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk \
             release/Customer-Manager-99.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Customer-Manager-99-APK
          path: release/Customer-Manager-99.apk
          if-no-files-found: error
          retention-days: 30
